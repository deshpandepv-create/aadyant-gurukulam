<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / App Meta -->
    <meta name="application-name" content="Aadyant Gurukulam" />
    <meta name="description" content="Aadyant Gurukulam School Management Portal — Deshpande Education Foundation" />
    <meta name="theme-color" content="#1A2340" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aadyant" />
    <meta name="msapplication-TileColor" content="#1A2340" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icons/icon-512x512.png" color="#1A2340" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>Aadyant Gurukulam</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[SW] Registered:', reg.scope))
            .catch(err => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
